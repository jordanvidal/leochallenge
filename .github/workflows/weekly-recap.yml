# Filet du récap hebdo. Le tir nominal est un cron Vercel (vercel.json,
# lundi 08:00 UTC, précision ±59 min sur le plan Hobby). Ce workflow ne
# fait que rattraper : il passe deux heures plus tard et ne trouve
# normalement rien à faire.
#
# Pourquoi un filet sur une autre plateforme. Le 20/07 ce job était le
# déclencheur nominal, sur GitHub : il est parti avec 2h57 de retard, et
# les duels de la S2 ont dû être lancés à la main. Mesurés sur ce repo,
# les crons GitHub arrivent avec 50 min à 3h17 de retard. Deux tirs sur
# GitHub tomberaient ensemble le jour où GitHub va mal — Vercel d'abord,
# GitHub en secours, les deux ne se ratent pas en même temps.
#
# Le doublon ne coûte rien : la route détecte que les événements du feed
# existent déjà et sort sans notifier personne. Sans cette garde, ce
# filet enverrait un récap en double — c'est exactement ce qui est arrivé
# le 20/07, deux fois dans la même matinée.

name: Récap hebdo du lundi (filet)

on:
  schedule:
    - cron: "30 10 * * 1" # lundi 10:30 UTC — 2h après le tir Vercel
  workflow_dispatch: {} # déclenchement manuel pour tester

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - name: Appeler /api/cron/weekly-recap
        run: |
          curl --fail-with-body -sS \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://leochallenge.vercel.app/api/cron/weekly-recap
