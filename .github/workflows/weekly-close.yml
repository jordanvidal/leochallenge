# Clôture hebdo du dimanche soir, déclenché par GitHub Actions. Pourrait
# passer en cron Vercel (le plafond Hobby est de 100 crons, pas 2 comme on
# l'a longtemps cru ici), mais ce job n'écrit aucun état : s'il saute,
# rien ne casse. Attention s'il migre : la route ne déduplique pas ses push.
# 19:00 UTC = 21h00 Paris pendant le challenge (13/07 → 31/08, CEST).
# La route se protège elle-même : hors challenge ou hors dimanche, no-op.

name: Clôture hebdo du dimanche

on:
  schedule:
    - cron: "0 19 * * 0" # dimanche 19:00 UTC
  workflow_dispatch: {} # déclenchement manuel pour tester

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Appeler /api/cron/weekly-close
        run: |
          curl --fail-with-body -sS \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://leochallenge.vercel.app/api/cron/weekly-close
