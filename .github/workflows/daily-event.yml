# Cron externe du tirage + annonce du jour. Pourrait passer en cron Vercel
# (le plafond Hobby est de 100 crons, pas 2 comme on l'a longtemps cru
# ici), mais ce job n'écrit aucun état : en retard il est dégradé, jamais
# cassé. Attention s'il migre : la route ne déduplique pas ses push.
# 07:00 UTC = 09:00 Paris pendant le challenge (13/07 → 31/08, CEST).
# La route tire l'événement du jour et annonce qu'il y en a un — jamais lequel.
#
# 9h et non 6h : réveiller les gens à l'aube pour un événement, non (Jordan).
# Le retard de file de GitHub (5 à 20 min à l'heure ronde) est sans effet
# ici — à 9h, aucun événement n'a de fenêtre serrée. Seul le lève-tôt (finir
# avant 7h) n'est plus prompté par la notif : il récompense désormais qui
# s'entraîne tôt de lui-même, ce qui reste cohérent.

name: Tirage du jour à 9h

on:
  schedule:
    - cron: "0 7 * * *" # tous les jours 07:00 UTC (09:00 Paris)
  workflow_dispatch: {} # déclenchement manuel pour tester

jobs:
  draw:
    runs-on: ubuntu-latest
    steps:
      - name: Appeler /api/cron/daily-event
        run: |
          curl --fail-with-body -sS \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://leochallenge.vercel.app/api/cron/daily-event
